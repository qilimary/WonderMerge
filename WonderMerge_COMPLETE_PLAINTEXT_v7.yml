              private void drawCircleButton(Canvas canvas, RectF rect, String symbol) {
                  drawGlassPanel(canvas, rect, 0.75f, rect.width() * 0.5f);
                  paint.setShader(null);
                  paint.setTextAlign(Paint.Align.CENTER);
