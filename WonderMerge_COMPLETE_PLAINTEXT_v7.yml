                  paint.setTextAlign(Paint.Align.CENTER);
                  paint.setTypeface(FONT_BOLD);
                  paint.setTextSize(dp(18f));
                  paint.setColor(Color.WHITE);
                  canvas.drawText("开始游戏", rect.centerX(), rect.centerY() + dp(6f), paint);
              }
          
              private void drawGame(Canvas canvas) {
                  drawBackground(canvas, selectedTheme, false);
                  drawGameContainer(canvas);
                  drawHud(canvas);
                  drawWorldObjects(canvas);
                  drawHeldObject(canvas);
                  drawParticles(canvas);
                  drawScorePopups(canvas);
                  if (world.isGameOver()) drawGameOverOverlay(canvas);
                  if (restartConfirmVisible) drawRestartConfirmation(canvas);
              }
          
              private void drawGameContainer(Canvas canvas) {
                  tempRect.set(worldLeft, worldTop, worldRight, worldBottom);
                  if (gameContainerGradient == null || gameContainerTheme != selectedTheme) {
                      gameContainerGradient = new LinearGradient(worldLeft, worldTop, worldLeft, worldBottom,
                              gameContainerTop(), gameContainerBottom(), Shader.TileMode.CLAMP);
                      gameContainerTheme = selectedTheme;
                  }
                  paint.setShader(gameContainerGradient);
                  canvas.drawRoundRect(tempRect, dp(22f), dp(22f), paint);
                  paint.setShader(null);
          
                  stroke.setStrokeWidth(dp(1.5f));
                  stroke.setColor(containerBorder());
                  stroke.setPathEffect(null);
                  canvas.drawRoundRect(tempRect, dp(22f), dp(22f), stroke);
          
                  float danger = world.dangerRatio();
                  stroke.setStrokeWidth(dp(1.4f) + dp(1.4f) * danger);
                  stroke.setPathEffect(warningDash);
                  int lineColor = blend(containerLine(), Color.rgb(255, 76, 76), danger);
                  stroke.setColor(withAlpha(lineColor, (int) (150 + 105 * danger)));
                  canvas.drawLine(worldLeft + dp(10f), warningLine, worldRight - dp(10f), warningLine, stroke);
                  stroke.setPathEffect(null);
          
                  paint.setShader(null);
                  paint.setTextAlign(Paint.Align.LEFT);
                  paint.setTypeface(FONT_BOLD);
                  paint.setTextSize(dp(9f));
                  paint.setColor(withAlpha(lineColor, (int) (145 + danger * 90)));
                  canvas.drawText(danger > 0.05f ? "危险：请尽快合成" : "警戒线",
                          worldLeft + dp(15f), warningLine - dp(7f), paint);
              }
          
              private void drawHud(Canvas canvas) {
                  float top = dp(16f);
                  float buttonSize = dp(42f);
