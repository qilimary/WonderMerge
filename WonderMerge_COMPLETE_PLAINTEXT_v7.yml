          # FILE 15/18: app/src/main/java/com/qili/wondermerge/GameWorld.java (598 lines)
          cat > 'generated_project/app/src/main/java/com/qili/wondermerge/GameWorld.java' <<'WONDERMERGE_FILE_15'
          package com.qili.wondermerge;
          
          import java.util.ArrayList;
          import java.util.Collections;
          import java.util.Iterator;
          import java.util.List;
          import java.util.Random;
          
          /**
           * 轻量级二维圆形物理世界。
           *
           * 使用固定 120 Hz 时间步、质量/转动惯量、库仑摩擦和低回弹接触，
           * 让堆叠在不同刷新率的手机上都尽量稳定，同时保留合成游戏需要的柔和手感。
           */
          final class GameWorld {
              private static final float FIXED_STEP = 1f / 120f;
              private static final int MAX_STEPS_PER_FRAME = 8;
              private static final int SOLVER_ITERATIONS = 7;
          
              static final class Body {
                  long id;
                  int level;
                  float x;
                  float y;
                  float vx;
                  float vy;
                  float radius;
                  float angle;
                  float angularVelocity;
                  float age;
                  float squash;
                  float impactCooldown;
          
                  Body(long id, int level, float x, float y, float radius) {
                      this.id = id;
                      this.level = level;
                      this.x = x;
                      this.y = y;
                      this.radius = radius;
                  }
              }
          
              static final class Particle {
                  float x;
                  float y;
                  float vx;
                  float vy;
                  float life;
                  float maxLife;
                  float size;
                  int level;
          
                  Particle(float x, float y, float vx, float vy, float life, float size, int level) {
                      this.x = x;
                      this.y = y;
                      this.vx = vx;
                      this.vy = vy;
                      this.life = life;
                      this.maxLife = life;
                      this.size = size;
                      this.level = level;
                  }
              }
          
              static final class MergeEvent {
                  final float x;
                  final float y;
                  final int newLevel;
                  final int gainedScore;
          
                  MergeEvent(float x, float y, int newLevel, int gainedScore) {
                      this.x = x;
                      this.y = y;
                      this.newLevel = newLevel;
                      this.gainedScore = gainedScore;
                  }
              }
          
              static final class ImpactEvent {
                  final float strength;
          
                  ImpactEvent(float strength) {
                      this.strength = strength;
                  }
              }
          
              private final ArrayList<Body> bodies = new ArrayList<>();
              private final ArrayList<Particle> particles = new ArrayList<>();
              private final ArrayList<MergeEvent> mergeEvents = new ArrayList<>();
              private final ArrayList<ImpactEvent> impactEvents = new ArrayList<>();
              private final Random random = new Random();
          
              private float left;
              private float right;
              private float top;
              private float bottom;
              private float warningLine;
              private float worldWidth = 1f;
              private float gravity = 1f;
              private float accumulator;
              private float strongestImpact;
              private long nextId = 1L;
              private float dangerTime;
              private boolean gameOver;
              private int score;
              private int highestLevel;
          
              void configure(float left, float right, float top, float bottom, float warningLine) {
                  float oldLeft = this.left;
                  float oldTop = this.top;
                  float oldWidth = this.right - this.left;
                  float oldHeight = this.bottom - this.top;
                  float newWidth = Math.max(1f, right - left);
                  float newHeight = Math.max(1f, bottom - top);
                  boolean canRescale = oldWidth > 1f && oldHeight > 1f && !bodies.isEmpty();
          
                  this.left = left;
                  this.right = right;
                  this.top = top;
                  this.bottom = bottom;
                  this.warningLine = warningLine;
                  this.worldWidth = newWidth;
                  this.gravity = worldWidth * 3.72f;
          
                  for (Body body : bodies) {
                      if (canRescale) {
                          float sx = newWidth / oldWidth;
                          float sy = newHeight / oldHeight;
                          body.x = left + (body.x - oldLeft) * sx;
                          body.y = top + (body.y - oldTop) * sy;
                          body.vx *= sx;
                          body.vy *= sy;
                      }
                      body.radius = radiusFor(body.level);
                      body.x = clamp(body.x, left + body.radius, right - body.radius);
                      body.y = Math.min(body.y, bottom - body.radius);
                  }
              }
          
              void reset() {
                  bodies.clear();
                  particles.clear();
                  mergeEvents.clear();
                  impactEvents.clear();
                  nextId = 1L;
                  accumulator = 0f;
                  strongestImpact = 0f;
                  dangerTime = 0f;
                  gameOver = false;
                  score = 0;
                  highestLevel = 0;
              }
          
              int randomSpawnLevel() {
                  int roll = random.nextInt(100);
                  if (roll < 36) return 0;
                  if (roll < 64) return 1;
                  if (roll < 83) return 2;
                  if (roll < 95) return 3;
                  return ThemeData.MAX_SPAWN_LEVEL;
              }
          
              float radiusFor(int level) {
                  int safe = Math.max(0, Math.min(ThemeData.LEVEL_COUNT - 1, level));
                  return worldWidth * ThemeData.RADIUS_FACTORS[safe];
              }
          
              float spawnYFor(int level) {
                  return top + radiusFor(level) + worldWidth * 0.012f;
              }
          
              void drop(int level, float x) {
                  if (gameOver) return;
                  int safeLevel = Math.max(0, Math.min(ThemeData.MAX_SPAWN_LEVEL, level));
                  float radius = radiusFor(safeLevel);
                  Body body = new Body(nextId++, safeLevel,
                          clamp(x, left + radius, right - radius), spawnYFor(safeLevel), radius);
                  // 不再给物体随机自转；转动只由真实的切向碰撞和滚动产生。
                  body.vy = worldWidth * 0.035f;
                  body.impactCooldown = 0.09f;
                  bodies.add(body);
                  highestLevel = Math.max(highestLevel, safeLevel);
              }
          
              void update(float dt) {
                  if (dt <= 0f) return;
                  float frameTime = Math.min(dt, 0.05f);
                  strongestImpact = 0f;
          
                  if (!gameOver) {
                      accumulator += frameTime;
                      int steps = 0;
                      while (accumulator >= FIXED_STEP && steps < MAX_STEPS_PER_FRAME) {
                          updateStep(FIXED_STEP);
                          accumulator -= FIXED_STEP;
                          steps++;
                      }
                      if (steps == MAX_STEPS_PER_FRAME && accumulator >= FIXED_STEP) {
                          // 严重卡顿时丢弃过旧时间，避免恢复后物体突然“爆炸式”穿透。
                          accumulator = 0f;
                      }
                  } else {
                      accumulator = 0f;
                  }
          
                  if (strongestImpact > 0f) {
                      impactEvents.add(new ImpactEvent(strongestImpact));
                  }
                  updateParticles(frameTime);
                  updateDanger(frameTime);
              }
          
              private void updateStep(float dt) {
                  float terminalSpeed = worldWidth * 3.25f;
                  float linearDamping = (float) Math.pow(0.9985, dt * 60f);
                  float angularDamping = (float) Math.pow(0.940, dt * 60f);
          
                  for (Body body : bodies) {
                      body.age += dt;
                      body.impactCooldown = Math.max(0f, body.impactCooldown - dt);
                      body.vy = Math.min(terminalSpeed, body.vy + gravity * dt);
                      body.vx *= linearDamping;
                      body.angularVelocity *= angularDamping;
                      body.angularVelocity = clamp(body.angularVelocity, -4.2f, 4.2f);
