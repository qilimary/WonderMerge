name: Build WonderMerge APK (complete plaintext v7)

# 完整 Android 项目的 18 个文件都在本 YAML 中以明文列出；没有编码或压缩封装。
# 每个 heredoc 前都标注了源文件路径和源码行数，便于直接查看与后续修改。

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wondermerge-v7-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # 必须先生成 Gradle 文件，再运行 setup-gradle；这是本版对截图报错的直接修复。
      - name: Generate complete Android project from readable source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf generated_project
          mkdir -p 'generated_project'
          mkdir -p 'generated_project/app'
          mkdir -p 'generated_project/app/src/main'
          mkdir -p 'generated_project/app/src/main/java/com/qili/wondermerge'
          mkdir -p 'generated_project/app/src/main/res/drawable'
          mkdir -p 'generated_project/app/src/main/res/mipmap-anydpi-v26'
          mkdir -p 'generated_project/app/src/main/res/values'

          # FILE 01/18: build.gradle (3 lines)
          cat > 'generated_project/build.gradle' <<'WONDERMERGE_FILE_01'
          plugins {
              id 'com.android.application' version '8.13.2' apply false
          }
          WONDERMERGE_FILE_01

          # FILE 02/18: settings.gradle (18 lines)
          cat > 'generated_project/settings.gradle' <<'WONDERMERGE_FILE_02'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "WonderMerge"
          include ':app'
          WONDERMERGE_FILE_02

          # FILE 03/18: gradle.properties (3 lines)
          cat > 'generated_project/gradle.properties' <<'WONDERMERGE_FILE_03'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.nonTransitiveRClass=true
          WONDERMERGE_FILE_03

          # FILE 04/18: app/build.gradle (28 lines)
          cat > 'generated_project/app/build.gradle' <<'WONDERMERGE_FILE_04'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.qili.wondermerge'
              compileSdk 36
          
              defaultConfig {
                  applicationId 'com.qili.wondermerge'
                  minSdk 23
                  targetSdk 36
                  versionCode 5
                  versionName '2.3.0'
              }
          
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          WONDERMERGE_FILE_04

          # FILE 05/18: app/proguard-rules.pro (1 lines)
          cat > 'generated_project/app/proguard-rules.pro' <<'WONDERMERGE_FILE_05'
          # 当前项目不依赖反射框架，无需额外规则。
          WONDERMERGE_FILE_05

          # FILE 06/18: app/src/main/AndroidManifest.xml (22 lines)
          cat > 'generated_project/app/src/main/AndroidManifest.xml' <<'WONDERMERGE_FILE_06'
