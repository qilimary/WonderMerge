                      float baseX = i * r * 0.15f;
                      path.reset();
                      path.moveTo(baseX - r * 0.13f, -r * 0.72f);
                      path.quadTo(baseX, -r * (1.25f + 0.12f * (3 - Math.abs(i))),
                              baseX + r * 0.14f, -r * 0.70f);
                      path.close();
                      canvas.drawPath(path, paint);
                  }
              }
          
              private void drawCrown(Canvas canvas, float r, int alpha) {
                  paint.setShader(new LinearGradient(0f, -r * 1.35f, 0f, -r * 0.72f,
                          withAlpha(Color.rgb(255, 244, 148), alpha),
                          withAlpha(Color.rgb(219, 143, 28), alpha), Shader.TileMode.CLAMP));
                  path.reset();
                  path.moveTo(-r * 0.53f, -r * 0.75f);
                  path.lineTo(-r * 0.64f, -r * 1.22f);
                  path.lineTo(-r * 0.25f, -r * 0.98f);
                  path.lineTo(0f, -r * 1.39f);
                  path.lineTo(r * 0.25f, -r * 0.98f);
                  path.lineTo(r * 0.64f, -r * 1.22f);
                  path.lineTo(r * 0.53f, -r * 0.75f);
                  path.close();
                  canvas.drawPath(path, paint);
                  paint.setShader(null);
              }
          
              private void drawPores(Canvas canvas, float r, int alpha, int color, int count, float sizeFactor) {
                  paint.setShader(null);
                  paint.setColor(withAlpha(color, (int) (alpha * 0.35f)));
                  for (int i = 0; i < count; i++) {
                      double a = i * 2.399963229728653;
                      float rr = r * (0.18f + 0.72f * ((i * 37) % 101) / 101f);
                      float x = (float) Math.cos(a) * rr;
                      float y = (float) Math.sin(a) * rr;
                      canvas.drawCircle(x, y, Math.max(0.8f, r * sizeFactor * (0.7f + (i % 4) * 0.16f)), paint);
                  }
              }
          
              private void drawJellyfish(Canvas canvas, int level, float r, int alpha) {
                  int primary = ThemeData.primary(ThemeData.ThemeKind.JELLYFISH, level);
                  int secondary = ThemeData.secondary(ThemeData.ThemeKind.JELLYFISH, level);
                  float pulse = 1f + (level % 3) * 0.025f;
          
                  paint.setShader(new RadialGradient(0f, 0f, r * 1.22f,
                          withAlpha(mix(primary, Color.WHITE, 0.34f), (int) (alpha * 0.58f)),
                          withAlpha(primary, 0), Shader.TileMode.CLAMP));
                  canvas.drawCircle(0f, 0f, r * 1.18f, paint);
                  paint.setShader(null);
          
                  // 伞盖：半透明渐变与内部生殖腺纹理。
                  path.reset();
                  if (level == 5) {
                      // 箱水母使用近方形伞盖，不再只是换颜色和大小。
                      path.moveTo(-r * 0.76f, r * 0.02f);
                      path.lineTo(-r * 0.69f, -r * 0.68f);
                      path.quadTo(0f, -r * 1.03f, r * 0.69f, -r * 0.68f);
                      path.lineTo(r * 0.76f, r * 0.02f);
                      path.quadTo(r * 0.38f, r * 0.16f, 0f, r * 0.08f);
                      path.quadTo(-r * 0.38f, r * 0.16f, -r * 0.76f, r * 0.02f);
                  } else {
                      path.moveTo(-r * 0.82f, -r * 0.02f);
                      path.cubicTo(-r * 0.82f, -r * 0.78f, -r * 0.38f, -r * 0.94f, 0f, -r * 0.96f);
                      path.cubicTo(r * 0.42f, -r * 0.94f, r * 0.84f, -r * 0.70f, r * 0.82f, -r * 0.02f);
                      path.cubicTo(r * 0.55f, r * 0.12f, r * 0.28f, r * 0.04f, 0f, r * 0.16f);
                      path.cubicTo(-r * 0.28f, r * 0.04f, -r * 0.56f, r * 0.12f, -r * 0.82f, -r * 0.02f);
                  }
                  path.close();
                  paint.setShader(new RadialGradient(-r * 0.25f, -r * 0.52f, r * 1.2f,
                          new int[]{withAlpha(mix(primary, Color.WHITE, 0.56f), (int) (alpha * 0.98f)),
                                  withAlpha(primary, (int) (alpha * 0.98f)),
                                  withAlpha(secondary, alpha)},
                          new float[]{0f, 0.46f, 1f}, Shader.TileMode.CLAMP));
                  canvas.drawPath(path, paint);
                  paint.setShader(null);
          
                  stroke.setStrokeWidth(Math.max(1.1f, r * 0.052f));
                  stroke.setColor(withAlpha(mix(secondary, Color.rgb(14, 51, 83), 0.30f),
                          (int) (alpha * 0.86f)));
                  canvas.drawPath(path, stroke);
          
                  paint.setColor(withAlpha(mix(primary, Color.WHITE, 0.28f), (int) (alpha * 0.76f)));
                  int lobes = 3 + level % 6;
                  for (int i = 0; i < lobes; i++) {
                      double a = Math.PI * 2 * i / lobes + level * 0.22;
                      float cx = (float) Math.cos(a) * r * 0.29f;
                      float cy = -r * 0.37f + (float) Math.sin(a) * r * 0.20f;
                      canvas.drawOval(cx - r * 0.10f, cy - r * 0.15f, cx + r * 0.10f, cy + r * 0.15f, paint);
                  }
          
                  drawJellySignature(canvas, level, r, alpha, primary, secondary);
          
                  // 触手使用固定的贝塞尔曲线，避免逐帧随机闪烁。
                  int tentacles = 4 + Math.min(7, level);
                  for (int i = 0; i < tentacles; i++) {
                      float t = tentacles == 1 ? 0.5f : i / (float) (tentacles - 1);
                      float sx = -r * 0.62f + t * r * 1.24f;
                      float len = r * (0.73f + ((i * 29 + level * 11) % 7) * 0.045f);
                      float sway = (i % 2 == 0 ? 1f : -1f) * r * (0.12f + level * 0.006f);
                      stroke.setStrokeWidth(r * (0.027f + (i % 3) * 0.007f));
                      stroke.setColor(withAlpha(mix(primary, secondary, 0.22f),
                              (int) (alpha * (0.72f + (i % 2) * 0.12f))));
                      path.reset();
                      path.moveTo(sx, r * 0.02f);
                      path.cubicTo(sx + sway, r * 0.32f,
                              sx - sway * 1.25f, len * 0.72f,
                              sx + sway * 0.55f, len);
                      canvas.drawPath(path, stroke);
                  }
          
                  // 口腕，越高级越丰盛。
                  stroke.setStrokeWidth(r * (0.040f + level * 0.0015f));
                  stroke.setColor(withAlpha(mix(primary, Color.WHITE, 0.60f), (int) (alpha * 0.72f)));
                  for (int i = -1; i <= 1; i++) {
                      path.reset();
                      path.moveTo(i * r * 0.20f, -r * 0.02f);
                      path.cubicTo(i * r * 0.34f + r * 0.08f, r * 0.25f,
                              i * r * 0.09f - r * 0.06f, r * 0.56f,
                              i * r * 0.22f, r * 0.74f * pulse);
                      canvas.drawPath(path, stroke);
                  }
          
                  paint.setShader(new RadialGradient(-r * 0.32f, -r * 0.58f, r * 0.36f,
                          withAlpha(Color.WHITE, (int) (alpha * 0.82f)),
                          withAlpha(Color.WHITE, 0), Shader.TileMode.CLAMP));
                  canvas.drawOval(-r * 0.63f, -r * 0.82f, r * 0.05f, -r * 0.23f, paint);
                  paint.setShader(null);
              }
          
              private void drawJellySignature(Canvas canvas, int level, float r, int alpha,
                                              int primary, int secondary) {
                  paint.setShader(null);
                  stroke.setPathEffect(null);
                  stroke.setStrokeWidth(Math.max(1f, r * 0.035f));
                  stroke.setColor(withAlpha(mix(secondary, Color.rgb(31, 34, 91), 0.18f),
                          (int) (alpha * 0.72f)));
                  paint.setColor(withAlpha(mix(secondary, Color.WHITE, 0.18f),
                          (int) (alpha * 0.74f)));
          
                  switch (level) {
                      case 0:
                          // 水滴水母：三枚清晰水滴核心。
                          canvas.drawCircle(0f, -r * 0.42f, r * 0.13f, paint);
                          canvas.drawCircle(-r * 0.26f, -r * 0.26f, r * 0.075f, paint);
                          canvas.drawCircle(r * 0.26f, -r * 0.26f, r * 0.075f, paint);
                          break;
                      case 1:
                          // 灯塔水母：中轴灯柱与顶灯。
                          canvas.drawRoundRect(-r * 0.095f, -r * 0.72f, r * 0.095f, -r * 0.18f,
                                  r * 0.08f, r * 0.08f, paint);
                          paint.setColor(withAlpha(Color.rgb(255, 240, 142), (int) (alpha * 0.92f)));
                          canvas.drawCircle(0f, -r * 0.67f, r * 0.105f, paint);
                          break;
                      case 2:
                          // 海月水母：经典四叶生殖腺。
                          for (int i = 0; i < 4; i++) {
                              double a = Math.PI * 0.5 * i + Math.PI * 0.25;
                              float x = (float) Math.cos(a) * r * 0.21f;
                              float y = -r * 0.38f + (float) Math.sin(a) * r * 0.18f;
                              canvas.drawOval(x - r * 0.11f, y - r * 0.15f,
                                      x + r * 0.11f, y + r * 0.15f, stroke);
                          }
                          break;
                      case 3:
                          // 紫纹水母：纵向放射纹。
                          for (int i = -2; i <= 2; i++) {
                              float x = i * r * 0.20f;
                              path.reset();
                              path.moveTo(x * 0.35f, -r * 0.82f);
                              path.quadTo(x * 1.15f, -r * 0.50f, x, -r * 0.12f);
                              canvas.drawPath(path, stroke);
                          }
                          break;
                      case 4:
                          // 霞水母：暖色放射光芒。
                          stroke.setColor(withAlpha(Color.rgb(255, 223, 151), (int) (alpha * 0.82f)));
                          for (int i = 0; i < 7; i++) {
                              double a = Math.PI * 2.0 * i / 7.0;
                              canvas.drawLine(0f, -r * 0.40f,
                                      (float) Math.cos(a) * r * 0.48f,
                                      -r * 0.40f + (float) Math.sin(a) * r * 0.32f, stroke);
                          }
                          break;
                      case 5:
                          // 箱水母：菱形窗口。
                          path.reset();
                          path.moveTo(0f, -r * 0.73f);
                          path.lineTo(r * 0.34f, -r * 0.42f);
                          path.lineTo(0f, -r * 0.12f);
                          path.lineTo(-r * 0.34f, -r * 0.42f);
                          path.close();
                          canvas.drawPath(path, stroke);
                          break;
                      case 6:
                          // 狮鬃水母：密集鬃毛圆点。
                          for (int i = 0; i < 10; i++) {
                              double a = Math.PI * 2.0 * i / 10.0;
                              canvas.drawCircle((float) Math.cos(a) * r * 0.34f,
                                      -r * 0.39f + (float) Math.sin(a) * r * 0.25f,
                                      r * 0.055f, paint);
                          }
                          break;
                      case 7:
                          // 黄金水母：金色核心与光环。
                          paint.setColor(withAlpha(Color.rgb(255, 238, 128), alpha));
                          canvas.drawCircle(0f, -r * 0.40f, r * 0.18f, paint);
                          oval.set(-r * 0.38f, -r * 0.69f, r * 0.38f, -r * 0.11f);
                          canvas.drawOval(oval, stroke);
                          break;
                      case 8:
                          // 幽灵水母：双层新月纹。
                          oval.set(-r * 0.42f, -r * 0.70f, r * 0.42f, -r * 0.10f);
                          canvas.drawArc(oval, 55f, 245f, false, stroke);
                          oval.inset(r * 0.12f, r * 0.10f);
                          canvas.drawArc(oval, 62f, 230f, false, stroke);
                          break;
                      case 9:
                          // 星云水母：双旋臂。
                          oval.set(-r * 0.45f, -r * 0.72f, r * 0.45f, -r * 0.08f);
                          canvas.drawArc(oval, 18f, 230f, false, stroke);
                          oval.inset(r * 0.14f, r * 0.10f);
                          canvas.drawArc(oval, 198f, 210f, false, stroke);
                          break;
                      case 10:
                      default:
                          // 月神水母：醒目的八芒星核心。
                          path.reset();
                          for (int i = 0; i < 16; i++) {
                              double a = -Math.PI / 2.0 + i * Math.PI / 8.0;
                              float rr = (i & 1) == 0 ? r * 0.27f : r * 0.11f;
                              float x = (float) Math.cos(a) * rr;
                              float y = -r * 0.40f + (float) Math.sin(a) * rr;
                              if (i == 0) path.moveTo(x, y); else path.lineTo(x, y);
                          }
                          path.close();
                          canvas.drawPath(path, paint);
                          break;
                  }
              }
          
              private void drawPlanet(Canvas canvas, int level, float r, int alpha) {
                  int primary = ThemeData.primary(ThemeData.ThemeKind.PLANET, level);
                  int secondary = ThemeData.secondary(ThemeData.ThemeKind.PLANET, level);
          
                  if (level == 10) drawSunAura(canvas, r, alpha);
                  if (level == 8) drawSaturnBackRing(canvas, r, alpha);
                  if (level == 10) drawSolarBackRing(canvas, r, alpha);
          
                  paint.setShader(new RadialGradient(0f, 0f, r * 1.18f,
                          withAlpha(mix(primary, Color.WHITE, 0.18f), (int) (alpha * 0.38f)),
                          withAlpha(primary, 0), Shader.TileMode.CLAMP));
                  canvas.drawCircle(0f, 0f, r * 1.18f, paint);
          
                  paint.setShader(new RadialGradient(-r * 0.34f, -r * 0.40f, r * 1.48f,
                          new int[]{withAlpha(mix(primary, Color.WHITE, 0.42f), alpha),
                                  withAlpha(primary, alpha), withAlpha(secondary, alpha)},
                          new float[]{0f, 0.48f, 1f}, Shader.TileMode.CLAMP));
                  canvas.drawCircle(0f, 0f, r, paint);
                  paint.setShader(null);
          
                  canvas.save();
                  path.reset();
                  path.addCircle(0f, 0f, r * 0.98f, Path.Direction.CW);
                  canvas.clipPath(path);
                  switch (level) {
                      case 0:
                          drawMeteorSurface(canvas, r, alpha);
                          break;
                      case 1:
                          drawMoonSurface(canvas, r, alpha);
                          break;
                      case 2:
                          drawMercurySurface(canvas, r, alpha);
                          break;
                      case 3:
                          drawMars(canvas, r, alpha);
                          break;
                      case 4:
                          drawVenus(canvas, r, alpha);
                          break;
                      case 5:
                          drawEarth(canvas, r, alpha);
                          break;
                      case 6:
                          drawGasBands(canvas, r, alpha, Color.rgb(67, 158, 235), false);
                          break;
                      case 7:
                          drawGasBands(canvas, r, alpha, Color.rgb(174, 241, 234), false);
                          break;
                      case 8:
                          drawGasBands(canvas, r, alpha, Color.rgb(234, 209, 158), false);
                          break;
                      case 9:
                          drawGasBands(canvas, r, alpha, Color.rgb(236, 196, 142), true);
                          break;
                      case 10:
                          drawSunSurface(canvas, r, alpha);
                          break;
                      default:
                          break;
                  }
                  canvas.restore();
          
                  stroke.setStrokeWidth(Math.max(1.2f, r * 0.038f));
                  stroke.setColor(withAlpha(mix(secondary, Color.BLACK, 0.22f), (int) (alpha * 0.68f)));
                  canvas.drawCircle(0f, 0f, r * 0.975f, stroke);
                  stroke.setStrokeWidth(Math.max(1.1f, r * 0.026f));
                  stroke.setColor(withAlpha(Color.WHITE, (int) (alpha * 0.48f)));
                  oval.set(-r * 0.95f, -r * 0.95f, r * 0.95f, r * 0.95f);
                  canvas.drawArc(oval, 198f, 112f, false, stroke);
                  paint.setShader(new RadialGradient(-r * 0.36f, -r * 0.44f, r * 0.40f,
                          withAlpha(Color.WHITE, (int) (alpha * 0.66f)),
                          withAlpha(Color.WHITE, 0), Shader.TileMode.CLAMP));
                  canvas.drawCircle(-r * 0.31f, -r * 0.38f, r * 0.40f, paint);
                  paint.setShader(null);
          
                  // 前半圈最后覆盖在球面上，才有真正环绕星球的前后空间关系。
                  if (level == 8) drawSaturnFrontRing(canvas, r, alpha);
                  if (level == 10) drawSolarFrontRing(canvas, r, alpha);
              }
          
              private void drawMeteorSurface(Canvas canvas, float r, int alpha) {
                  // 陨石：棱面、熔岩裂纹与不规则岩块，和圆润月球彻底分开。
                  int[] facetColors = {
                          Color.rgb(78, 58, 52), Color.rgb(116, 82, 65),
                          Color.rgb(153, 105, 72), Color.rgb(62, 50, 51)
                  };
                  for (int i = 0; i < 7; i++) {
                      double a = i * Math.PI * 2.0 / 7.0 + 0.26;
                      double b = a + 0.92;
                      path.reset();
                      path.moveTo(0f, 0f);
                      path.lineTo((float) Math.cos(a) * r, (float) Math.sin(a) * r);
                      path.lineTo((float) Math.cos(b) * r, (float) Math.sin(b) * r);
                      path.close();
                      paint.setColor(withAlpha(facetColors[i % facetColors.length], (int) (alpha * 0.72f)));
                      canvas.drawPath(path, paint);
                  }
                  stroke.setStrokeWidth(Math.max(1f, r * 0.045f));
                  stroke.setColor(withAlpha(Color.rgb(255, 142, 62), (int) (alpha * 0.78f)));
                  path.reset();
                  path.moveTo(-r * 0.62f, -r * 0.28f);
                  path.lineTo(-r * 0.22f, -r * 0.08f);
                  path.lineTo(-r * 0.35f, r * 0.20f);
                  path.lineTo(r * 0.12f, r * 0.34f);
                  path.lineTo(r * 0.42f, r * 0.68f);
                  canvas.drawPath(path, stroke);
                  paint.setColor(withAlpha(Color.rgb(40, 30, 31), (int) (alpha * 0.82f)));
                  canvas.drawOval(r * 0.18f, -r * 0.64f, r * 0.69f, -r * 0.18f, paint);
                  canvas.drawOval(-r * 0.70f, r * 0.28f, -r * 0.30f, r * 0.62f, paint);
              }
          
              private void drawMoonSurface(Canvas canvas, float r, int alpha) {
                  // 月球：大块灰色月海和一个醒目的环形坑。
                  paint.setColor(withAlpha(Color.rgb(91, 99, 113), (int) (alpha * 0.54f)));
                  canvas.drawOval(-r * 0.76f, -r * 0.28f, -r * 0.08f, r * 0.35f, paint);
                  canvas.drawOval(r * 0.08f, -r * 0.70f, r * 0.62f, -r * 0.18f, paint);
                  canvas.drawOval(r * 0.22f, r * 0.23f, r * 0.78f, r * 0.68f, paint);
                  drawCraters(canvas, r, alpha, 1);
                  stroke.setStrokeWidth(Math.max(1f, r * 0.050f));
                  stroke.setColor(withAlpha(Color.rgb(238, 243, 249), (int) (alpha * 0.64f)));
                  canvas.drawCircle(-r * 0.26f, r * 0.32f, r * 0.20f, stroke);
              }
          
              private void drawMercurySurface(Canvas canvas, float r, int alpha) {
                  // 水星：铜金色表面与放射状卡洛里盆地。
                  drawCraters(canvas, r, alpha, 2);
                  float cx = r * 0.24f;
                  float cy = r * 0.16f;
                  stroke.setStrokeWidth(Math.max(0.9f, r * 0.022f));
                  stroke.setColor(withAlpha(Color.rgb(255, 226, 166), (int) (alpha * 0.72f)));
                  for (int i = 0; i < 10; i++) {
                      double a = Math.PI * 2.0 * i / 10.0;
                      canvas.drawLine(cx + (float) Math.cos(a) * r * 0.20f,
                              cy + (float) Math.sin(a) * r * 0.20f,
                              cx + (float) Math.cos(a) * r * 0.61f,
                              cy + (float) Math.sin(a) * r * 0.61f, stroke);
                  }
                  paint.setColor(withAlpha(Color.rgb(104, 78, 57), (int) (alpha * 0.86f)));
                  canvas.drawCircle(cx, cy, r * 0.19f, paint);
                  stroke.setStrokeWidth(Math.max(1f, r * 0.035f));
                  stroke.setColor(withAlpha(Color.rgb(247, 203, 128), (int) (alpha * 0.76f)));
                  canvas.drawCircle(cx, cy, r * 0.22f, stroke);
              }
          
              private void drawCraters(Canvas canvas, float r, int alpha, int level) {
                  int count = 7 + level * 4;
                  for (int i = 0; i < count; i++) {
                      double a = i * 2.399963229728653 + level;
                      float rr = r * (0.16f + 0.66f * ((i * 43 + 17) % 97) / 97f);
                      float x = (float) Math.cos(a) * rr;
                      float y = (float) Math.sin(a) * rr;
                      float cr = r * (0.045f + ((i * 13) % 7) * 0.012f);
                      paint.setColor(withAlpha(Color.BLACK, (int) (alpha * 0.34f)));
                      canvas.drawCircle(x + cr * 0.16f, y + cr * 0.20f, cr, paint);
                      paint.setColor(withAlpha(Color.WHITE, (int) (alpha * 0.23f)));
                      canvas.drawCircle(x - cr * 0.16f, y - cr * 0.18f, cr * 0.74f, paint);
                  }
              }
          
              private void drawMars(Canvas canvas, float r, int alpha) {
                  paint.setColor(withAlpha(Color.rgb(89, 46, 38), (int) (alpha * 0.45f)));
                  canvas.drawOval(-r * 0.74f, -r * 0.18f, -r * 0.10f, r * 0.28f, paint);
                  canvas.drawOval(r * 0.08f, r * 0.12f, r * 0.72f, r * 0.53f, paint);
                  paint.setColor(withAlpha(Color.rgb(241, 214, 183), (int) (alpha * 0.58f)));
                  canvas.drawOval(-r * 0.60f, -r * 1.03f, r * 0.58f, -r * 0.75f, paint);
                  drawCraters(canvas, r, alpha / 2, 0);
              }
          
              private void drawVenus(Canvas canvas, float r, int alpha) {
                  stroke.setStrokeWidth(r * 0.13f);
                  stroke.setColor(withAlpha(Color.rgb(250, 221, 151), (int) (alpha * 0.38f)));
                  for (int i = -4; i <= 4; i++) {
                      float y = i * r * 0.23f;
                      path.reset();
                      path.moveTo(-r, y - r * 0.08f);
                      path.cubicTo(-r * 0.35f, y + r * 0.18f, r * 0.32f, y - r * 0.18f, r, y + r * 0.06f);
                      canvas.drawPath(path, stroke);
                  }
              }
          
              private void drawEarth(Canvas canvas, float r, int alpha) {
                  paint.setColor(withAlpha(Color.rgb(72, 164, 92), (int) (alpha * 0.92f)));
                  path.reset();
                  path.moveTo(-r * 0.72f, -r * 0.55f);
                  path.cubicTo(-r * 0.32f, -r * 0.78f, -r * 0.08f, -r * 0.46f, r * 0.08f, -r * 0.25f);
                  path.cubicTo(r * 0.21f, -r * 0.02f, -r * 0.05f, r * 0.11f, -r * 0.18f, r * 0.28f);
                  path.cubicTo(-r * 0.34f, r * 0.52f, -r * 0.61f, r * 0.26f, -r * 0.55f, r * 0.02f);
                  path.close();
                  canvas.drawPath(path, paint);
                  path.reset();
