                  canvas.drawText("得分", scoreX, top + dp(9f), paint);
                  paint.setTypeface(FONT_BOLD);
                  paint.setTextSize(dp(25f));
                  paint.setColor(textPrimary());
                  canvas.drawText(String.valueOf(world.score()), scoreX, top + dp(36f), paint);
          
                  float infoTop = top + dp(53f);
                  paint.setTextAlign(Paint.Align.CENTER);
                  paint.setTypeface(FONT_BOLD);
                  paint.setTextSize(dp(10.5f));
                  paint.setColor(textPrimary());
                  canvas.drawText(selectedTheme.title + " · " + (selectedMode == ThemeData.GameMode.RANDOM ? "随机" : "可视"),
                          screenW * 0.5f, infoTop, paint);
