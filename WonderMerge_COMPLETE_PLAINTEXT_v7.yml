              private void drawBackground(Canvas canvas, ThemeData.ThemeKind theme, boolean menu) {
                  int width = getWidth();
                  int height = getHeight();
                  if (width <= 0 || height <= 0) return;
                  boolean stale = backgroundCache == null
                          || backgroundCache.isRecycled()
                          || backgroundCache.getWidth() != width
                          || backgroundCache.getHeight() != height
                          || backgroundTheme != theme
                          || backgroundMenu != menu;
                  if (stale) {
                      clearBackgroundCache();
                      try {
                          backgroundCache = Bitmap.createBitmap(width, height, Bitmap.Config.ARGB_8888);
                      } catch (OutOfMemoryError error) {
                          // 少数超高分辨率、低内存设备退回即时绘制，功能仍然可用。
                          renderBackground(canvas, theme, menu);
                          return;
                      }
                      renderBackground(new Canvas(backgroundCache), theme, menu);
                      backgroundTheme = theme;
                      backgroundMenu = menu;
                  }
                  canvas.drawBitmap(backgroundCache, 0f, 0f, null);
              }
          
              private void renderBackground(Canvas canvas, ThemeData.ThemeKind theme, boolean menu) {
                  int topColor;
                  int bottomColor;
                  switch (theme) {
                      case JELLYFISH:
                          topColor = Color.rgb(183, 235, 246);
                          bottomColor = Color.rgb(50, 143, 180);
                          break;
                      case PLANET:
                          topColor = Color.rgb(73, 88, 160);
                          bottomColor = Color.rgb(29, 32, 82);
                          break;
                      case FRUIT:
                      default:
                          topColor = Color.rgb(255, 248, 234);
                          bottomColor = Color.rgb(245, 218, 183);
                          break;
                  }
                  paint.setShader(new LinearGradient(0f, 0f, 0f, screenH, topColor, bottomColor, Shader.TileMode.CLAMP));
                  canvas.drawRect(0f, 0f, screenW, screenH, paint);
                  paint.setShader(null);
          
                  if (theme == ThemeData.ThemeKind.FRUIT) {
                      drawFruitBackground(canvas, menu);
                  } else if (theme == ThemeData.ThemeKind.JELLYFISH) {
                      drawOceanBackground(canvas, menu);
                  } else {
                      drawSpaceBackground(canvas, menu);
                  }
              }
          
              private void clearBackgroundCache() {
                  if (backgroundCache != null && !backgroundCache.isRecycled()) {
                      backgroundCache.recycle();
                  }
                  backgroundCache = null;
                  backgroundTheme = null;
              }
          
              private void drawFruitBackground(Canvas canvas, boolean menu) {
                  paint.setColor(Color.argb(24, 255, 255, 255));
                  for (int i = 0; i < 12; i++) {
                      float x = ((i * 83) % 101) / 101f * screenW;
                      float y = ((i * 137 + 29) % 211) / 211f * screenH;
                      float r = dp(18f + (i % 4) * 8f);
                      canvas.drawCircle(x, y, r, paint);
                  }
                  paint.setColor(Color.argb(menu ? 34 : 20, 78, 139, 63));
                  for (int i = 0; i < 7; i++) {
                      float x = (i % 2 == 0 ? dp(8f) : screenW - dp(8f));
                      float y = dp(90f + i * 126f);
                      canvas.save();
                      canvas.rotate(i % 2 == 0 ? -28f : 152f, x, y);
                      canvas.drawOval(x - dp(9f), y - dp(25f), x + dp(9f), y + dp(25f), paint);
                      canvas.restore();
                  }
              }
          
              private void drawOceanBackground(Canvas canvas, boolean menu) {
                  // 水面天光与光柱均使用“同色透明端点”，避免透明黑插值产生暗带或闪色。
                  float glowRadius = Math.max(screenW * 0.82f, screenH * 0.42f);
                  paint.setShader(new RadialGradient(screenW * 0.16f, screenH * 0.03f, glowRadius,
                          Color.argb(menu ? 150 : 112, 245, 255, 255),
                          Color.argb(0, 245, 255, 255), Shader.TileMode.CLAMP));
                  canvas.drawCircle(screenW * 0.16f, screenH * 0.03f, glowRadius, paint);
          
                  paint.setShader(new LinearGradient(screenW * 0.12f, 0f, screenW * 0.72f, screenH,
                          Color.argb(menu ? 64 : 42, 219, 252, 255),
                          Color.argb(0, 219, 252, 255), Shader.TileMode.CLAMP));
                  path.reset();
                  path.moveTo(screenW * 0.04f, 0f);
                  path.lineTo(screenW * 0.31f, 0f);
                  path.lineTo(screenW * 0.78f, screenH);
                  path.lineTo(screenW * 0.56f, screenH);
                  path.close();
                  canvas.drawPath(path, paint);
                  paint.setShader(null);
          
                  stroke.setShader(null);
                  stroke.setStrokeWidth(dp(1.0f));
                  stroke.setColor(Color.argb(menu ? 40 : 27, 231, 255, 255));
                  for (int i = 0; i < 8; i++) {
                      float y = screenH * (0.18f + i * 0.105f);
                      float shift = (i % 2 == 0 ? -0.08f : 0.06f) * screenW;
                      path.reset();
                      path.moveTo(-screenW * 0.12f, y);
                      path.cubicTo(screenW * 0.18f + shift, y - dp(11f),
                              screenW * 0.58f + shift, y + dp(12f),
                              screenW * 1.12f, y - dp(2f));
                      canvas.drawPath(path, stroke);
                  }
          
                  for (int i = 0; i < 34; i++) {
                      float x = ((i * 67 + 13) % 101) / 101f * screenW;
                      float y = ((i * 127 + 51) % 211) / 211f * screenH;
                      float r = dp(1.2f + (i % 5) * 0.82f);
                      paint.setColor(Color.argb(18 + (i % 4) * 8, 238, 255, 255));
                      canvas.drawCircle(x, y, r, paint);
                      stroke.setStrokeWidth(dp(0.8f));
                      stroke.setColor(Color.argb(66, 228, 253, 255));
                      canvas.drawCircle(x, y, r, stroke);
                  }
              }
          
              private void drawSpaceBackground(Canvas canvas, boolean menu) {
                  float nebulaRadius = Math.max(screenW * 0.72f, screenH * 0.34f);
                  paint.setShader(new RadialGradient(screenW * 0.84f, screenH * 0.22f,
                          nebulaRadius,
                          Color.argb(menu ? 110 : 76, 190, 112, 244),
                          Color.argb(0, 190, 112, 244), Shader.TileMode.CLAMP));
                  canvas.drawCircle(screenW * 0.84f, screenH * 0.22f, nebulaRadius, paint);
                  paint.setShader(new RadialGradient(screenW * 0.08f, screenH * 0.72f,
                          nebulaRadius * 0.88f,
                          Color.argb(menu ? 76 : 50, 69, 205, 235),
                          Color.argb(0, 69, 205, 235), Shader.TileMode.CLAMP));
                  canvas.drawCircle(screenW * 0.08f, screenH * 0.72f, nebulaRadius * 0.88f, paint);
                  paint.setShader(null);
          
                  for (int i = 0; i < 82; i++) {
                      float x = ((i * 73 + 19) % 211) / 211f * screenW;
                      float y = ((i * 131 + 7) % 307) / 307f * screenH;
                      float r = dp(0.48f + (i % 5) * 0.19f);
                      int a = 96 + (i % 6) * 25;
                      int starColor = i % 9 == 0 ? Color.rgb(196, 235, 255)
                              : (i % 13 == 0 ? Color.rgb(255, 224, 184) : Color.rgb(235, 240, 255));
                      paint.setColor(withAlpha(starColor, Math.min(255, a)));
                      canvas.drawCircle(x, y, r, paint);
                      if (i % 17 == 0) {
                          stroke.setStrokeWidth(dp(0.65f));
                          stroke.setColor(withAlpha(starColor, 92));
                          canvas.drawLine(x - r * 3f, y, x + r * 3f, y, stroke);
                          canvas.drawLine(x, y - r * 3f, x, y + r * 3f, stroke);
                      }
                  }
              }
          
              private void drawGlassPanel(Canvas canvas, RectF rect, float opacity, float radius) {
                  int color;
                  if (selectedTheme == ThemeData.ThemeKind.FRUIT) {
                      color = Color.argb((int) (255 * opacity), 255, 252, 246);
                  } else if (selectedTheme == ThemeData.ThemeKind.JELLYFISH) {
                      color = Color.argb((int) (230 * opacity), 239, 252, 255);
                  } else {
                      color = Color.argb((int) (212 * opacity), 31, 40, 94);
                  }
                  paint.setShader(null);
                  paint.setColor(color);
                  canvas.drawRoundRect(rect, radius, radius, paint);
                  stroke.setStrokeWidth(dp(1f));
                  if (selectedTheme == ThemeData.ThemeKind.FRUIT) {
                      stroke.setColor(Color.argb(55, 86, 72, 49));
                  } else if (selectedTheme == ThemeData.ThemeKind.JELLYFISH) {
                      stroke.setColor(Color.argb(100, 39, 143, 179));
                  } else {
                      stroke.setColor(Color.argb(92, 196, 211, 255));
                  }
                  canvas.drawRoundRect(rect, radius, radius, stroke);
              }
          
              private void drawSectionLabel(Canvas canvas, String label, float y) {
                  paint.setTextAlign(Paint.Align.LEFT);
                  paint.setTypeface(FONT_BOLD);
                  paint.setTextSize(dp(12.5f));
                  paint.setColor(textPrimary());
                  canvas.drawText(label, dp(16f), y, paint);
              }
          
              private void drawTwoLineText(Canvas canvas, String text, float x, float y, float right, float lineHeight) {
                  int mid = text.length() > 9 ? text.length() / 2 : text.length();
                  if (mid >= text.length()) {
                      canvas.drawText(text, x, y, paint);
                  } else {
                      canvas.drawText(text.substring(0, mid), x, y, paint);
                      canvas.drawText(text.substring(mid), x, y + lineHeight, paint);
                  }
              }
          
              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  float x = event.getX();
                  float y = event.getY();
          
                  if (screenState == ScreenState.MENU) {
                      if (event.getActionMasked() == MotionEvent.ACTION_UP) {
                          for (int i = 0; i < themeRects.length; i++) {
                              if (themeRects[i].contains(x, y)) {
                                  selectedTheme = ThemeData.ThemeKind.values()[i];
                                  preferences.edit().putInt("selected_theme", i).apply();
                                  vibrate(8);
                                  invalidate();
                                  return performClick();
                              }
                          }
                          for (int i = 0; i < modeRects.length; i++) {
                              if (modeRects[i].contains(x, y)) {
                                  selectedMode = ThemeData.GameMode.values()[i];
                                  preferences.edit().putInt("selected_mode", i).apply();
                                  vibrate(8);
                                  invalidate();
                                  return performClick();
                              }
                          }
                          if (startRect.contains(x, y)) {
                              startGame();
                              vibrate(14);
                              return performClick();
                          }
                      }
                      return true;
                  }
          
                  if (restartConfirmVisible) {
                      if (event.getActionMasked() == MotionEvent.ACTION_UP) {
                          if (confirmYesRect.contains(x, y)) {
                              startGame();
                              vibrate(16);
                              return performClick();
                          }
                          if (confirmNoRect.contains(x, y)) {
                              restartConfirmVisible = false;
                              lastFrameNanos = System.nanoTime();
                              invalidate();
                              return performClick();
                          }
                      }
                      return true;
                  }
          
                  if (world.isGameOver()) {
                      if (event.getActionMasked() == MotionEvent.ACTION_UP) {
                          if (overlayRestartRect.contains(x, y)) {
                              startGame();
                              return performClick();
                          }
                          if (overlayMenuRect.contains(x, y)) {
                              screenState = ScreenState.MENU;
                              invalidate();
                              return performClick();
                          }
                      }
                      return true;
                  }
          
                  if (event.getActionMasked() == MotionEvent.ACTION_UP) {
                      if (backRect.contains(x, y)) {
                          screenState = ScreenState.MENU;
                          restartConfirmVisible = false;
                          saveBest(Math.max(currentBest, world.score()));
                          aiming = false;
                          invalidate();
                          return performClick();
                      }
                      if (guideRect.contains(x, y)) {
                          guideEnabled = !guideEnabled;
                          vibrate(8);
                          invalidate();
                          return performClick();
                      }
                      if (restartRect.contains(x, y)) {
                          restartConfirmVisible = true;
                          aiming = false;
                          invalidate();
                          return performClick();
                      }
                  }
          
                  switch (event.getActionMasked()) {
                      case MotionEvent.ACTION_DOWN:
                          if (readyToDrop && y >= worldTop - dp(8f)) {
                              aiming = true;
                              updateHeldX(x);
                          }
                          break;
                      case MotionEvent.ACTION_MOVE:
                          if (aiming && readyToDrop) updateHeldX(x);
                          break;
                      case MotionEvent.ACTION_UP:
                          if (aiming && readyToDrop) {
                              updateHeldX(x);
                              dropCurrent();
                              performClick();
                          }
                          aiming = false;
                          break;
                      case MotionEvent.ACTION_CANCEL:
                          aiming = false;
                          break;
                      default:
                          break;
                  }
                  return true;
              }
          
              private void updateHeldX(float x) {
                  float radius = world.radiusFor(currentLevel);
                  heldX = clamp(x, worldLeft + radius, worldRight - radius);
              }
          
              @Override
              public boolean performClick() {
                  super.performClick();
                  return true;
              }
          
              boolean handleBackPressed() {
                  if (restartConfirmVisible) {
                      restartConfirmVisible = false;
                      lastFrameNanos = System.nanoTime();
                      invalidate();
                      return true;
                  }
                  if (screenState == ScreenState.GAME) {
                      saveBest(Math.max(currentBest, world.score()));
                      screenState = ScreenState.MENU;
                      aiming = false;
                      invalidate();
                      return true;
                  }
                  return false;
              }
          
              void pauseLoop() {
                  running = false;
                  lastFrameNanos = 0L;
              }
          
              void resumeLoop() {
                  running = true;
                  lastFrameNanos = 0L;
                  invalidate();
              }
          
              @Override
              protected void onDetachedFromWindow() {
                  running = false;
                  clearBackgroundCache();
                  orbRenderer.clearCache();
                  gameAudio.release();
                  super.onDetachedFromWindow();
              }
          
              private int loadBest(ThemeData.ThemeKind theme, ThemeData.GameMode mode) {
                  return preferences.getInt(bestKey(theme, mode), 0);
              }
          
              private void saveBest(int score) {
                  if (score <= loadBest(selectedTheme, selectedMode)) return;
                  preferences.edit().putInt(bestKey(selectedTheme, selectedMode), score).apply();
                  currentBest = score;
              }
          
              private static String bestKey(ThemeData.ThemeKind theme, ThemeData.GameMode mode) {
                  return String.format(Locale.US, "best_%s_%s", theme.name(), mode.name());
              }
          
              private void playMergeFeedback(int level) {
                  vibrate(Math.min(30, 10 + level * 2));
                  gameAudio.playMerge(level, selectedTheme);
              }
          
              private void playGameOverFeedback() {
                  vibrate(90);
                  gameAudio.playGameOver();
              }
          
              private void vibrate(long millis) {
                  if (vibrator == null || !vibrator.hasVibrator()) return;
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          vibrator.vibrate(VibrationEffect.createOneShot(millis, VibrationEffect.DEFAULT_AMPLITUDE));
                      } else {
                          //noinspection deprecation
                          vibrator.vibrate(millis);
                      }
                  } catch (SecurityException ignored) {
                  }
              }
          
              private int textPrimary() {
                  if (selectedTheme == ThemeData.ThemeKind.FRUIT) return Color.rgb(64, 56, 47);
                  if (selectedTheme == ThemeData.ThemeKind.JELLYFISH) return Color.rgb(20, 63, 82);
                  return Color.rgb(244, 247, 255);
              }
          
              private int textSecondary() {
                  if (selectedTheme == ThemeData.ThemeKind.FRUIT) return Color.rgb(121, 105, 88);
                  if (selectedTheme == ThemeData.ThemeKind.JELLYFISH) return Color.rgb(55, 103, 122);
                  return Color.rgb(190, 204, 235);
              }
          
              private int accentColor() {
                  switch (selectedTheme) {
                      case JELLYFISH:
                          return Color.rgb(26, 158, 197);
                      case PLANET:
                          return Color.rgb(173, 188, 255);
                      case FRUIT:
                      default:
                          return Color.rgb(226, 111, 57);
                  }
              }
          
              private int gameContainerTop() {
                  switch (selectedTheme) {
                      case JELLYFISH:
                          return Color.argb(238, 83, 164, 190);
                      case PLANET:
                          return Color.argb(232, 36, 46, 108);
                      case FRUIT:
                      default:
                          return Color.argb(230, 255, 250, 235);
                  }
              }
          
              private int gameContainerBottom() {
                  switch (selectedTheme) {
                      case JELLYFISH:
                          return Color.argb(242, 31, 112, 151);
                      case PLANET:
                          return Color.argb(238, 19, 24, 68);
                      case FRUIT:
                      default:
                          return Color.argb(235, 242, 218, 181);
                  }
              }
          
              private int containerBorder() {
                  if (selectedTheme == ThemeData.ThemeKind.FRUIT) return Color.argb(95, 94, 70, 46);
                  if (selectedTheme == ThemeData.ThemeKind.JELLYFISH) return Color.argb(150, 218, 250, 255);
                  return Color.argb(132, 173, 209, 255);
              }
          
              private int containerLine() {
                  if (selectedTheme == ThemeData.ThemeKind.FRUIT) return Color.rgb(171, 104, 66);
                  if (selectedTheme == ThemeData.ThemeKind.JELLYFISH) return Color.rgb(220, 250, 255);
                  return Color.rgb(169, 213, 255);
              }
          
              private boolean usesLightPanels() {
                  return selectedTheme == ThemeData.ThemeKind.FRUIT
                          || selectedTheme == ThemeData.ThemeKind.JELLYFISH;
              }
          
              private float dp(float value) {
                  return value * density;
              }
          
              private static float clamp(float value, float min, float max) {
                  return Math.max(min, Math.min(max, value));
              }
          
              private static int withAlpha(int color, int alpha) {
                  return Color.argb(Math.max(0, Math.min(255, alpha)),
                          Color.red(color), Color.green(color), Color.blue(color));
              }
          
              private static int blend(int a, int b, float t) {
                  float u = Math.max(0f, Math.min(1f, t));
                  return Color.rgb(
                          (int) (Color.red(a) * (1f - u) + Color.red(b) * u),
                          (int) (Color.green(a) * (1f - u) + Color.green(b) * u),
                          (int) (Color.blue(a) * (1f - u) + Color.blue(b) * u));
              }
          }
