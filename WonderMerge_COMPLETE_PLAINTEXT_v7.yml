              private void drawGuideToggleButton(Canvas canvas, RectF rect) {
                  drawGlassPanel(canvas, rect, guideEnabled ? 0.92f : 0.72f, rect.width() * 0.5f);
                  float cx = rect.centerX();
                  if (guideEnabled) {
                      paint.setShader(null);
                      paint.setColor(withAlpha(accentColor(), 34));
                      canvas.drawCircle(cx, rect.centerY(), rect.width() * 0.42f, paint);
                      stroke.setStrokeWidth(dp(1.4f));
                      stroke.setColor(withAlpha(accentColor(), 205));
                      canvas.drawCircle(cx, rect.centerY(), rect.width() * 0.42f, stroke);
                  }
                  int iconColor = guideEnabled ? accentColor() : textSecondary();
                  paint.setColor(withAlpha(iconColor, 235));
                  canvas.drawCircle(cx, rect.top + dp(10.5f), dp(3.1f), paint);
                  stroke.setStrokeWidth(dp(1.25f));
                  stroke.setColor(withAlpha(iconColor, 220));
                  stroke.setPathEffect(guideDash);
                  canvas.drawLine(cx, rect.top + dp(16f), cx, rect.bottom - dp(8f), stroke);
                  stroke.setPathEffect(null);
              }
          
              private void drawWorldObjects(Canvas canvas) {
                  for (GameWorld.Body body : world.bodies()) {
                      // 松手后先保持与手持预览完全相同的外观，再平滑接入碰撞形变。
                      // 这样不会因第一帧的旋转/缩放重采样而产生“透明度闪一下”的错觉。
                      float visualBlend = clamp((body.age - 0.10f) / 0.16f, 0f, 1f);
                      visualBlend = visualBlend * visualBlend * (3f - 2f * visualBlend);
                      float squash = body.squash * visualBlend;
                      float visualAngle = selectedTheme == ThemeData.ThemeKind.JELLYFISH
                              ? body.angle * 0.10f * visualBlend : body.angle * visualBlend;
                      canvas.save();
                      canvas.translate(body.x, body.y);
                      canvas.scale(1f + squash, 1f - squash);
                      orbRenderer.draw(canvas, selectedTheme, body.level, 0f, 0f,
                              body.radius, visualAngle, 255, false);
                      canvas.restore();
                  }
              }
          
              private void drawHeldObject(Canvas canvas) {
                  if (!readyToDrop || world.isGameOver()) return;
                  float radius = world.radiusFor(currentLevel);
                  heldX = clamp(heldX, worldLeft + radius, worldRight - radius);
                  // 和物理世界使用完全相同的出生位置与角度，松手前后不会跳位或闪一下。
                  float y = world.spawnYFor(currentLevel);
          
                  if (guideEnabled) {
                      stroke.setStrokeWidth(dp(1f));
                      stroke.setColor(withAlpha(containerLine(), 112));
                      stroke.setPathEffect(guideDash);
                      canvas.drawLine(heldX, y + radius * 0.80f, heldX, worldBottom - dp(8f), stroke);
                      stroke.setPathEffect(null);
                  }
          
                  boolean crowded = world.isCrowdedNearSpawn(heldX, radius);
                  orbRenderer.draw(canvas, selectedTheme, currentLevel, heldX, y, radius,
                          0f, 255, true);
                  if (crowded) {
                      stroke.setShader(null);
                      stroke.setStrokeWidth(dp(1.4f));
                      stroke.setColor(Color.argb(180, 255, 92, 92));
                      canvas.drawCircle(heldX, y, radius + dp(3f), stroke);
                  }
          
                  paint.setTextAlign(Paint.Align.CENTER);
                  paint.setTypeface(FONT_BOLD);
                  paint.setTextSize(dp(9.5f));
                  paint.setColor(withAlpha(textPrimary(), 205));
                  canvas.drawText(ThemeData.name(selectedTheme, currentLevel), heldX,
                          Math.min(warningLine - dp(9f), y + radius + dp(13f)), paint);
              }
          
              private void drawParticles(Canvas canvas) {
                  for (GameWorld.Particle particle : world.particles()) {
                      float ratio = particle.life / particle.maxLife;
                      int color = ThemeData.primary(selectedTheme, particle.level);
                      paint.setShader(null);
                      paint.setColor(withAlpha(color, (int) (105 * ratio)));
                      canvas.drawCircle(particle.x, particle.y, particle.size * 1.8f, paint);
                      paint.setColor(withAlpha(Color.WHITE, (int) (230 * ratio)));
                      canvas.drawCircle(particle.x, particle.y, particle.size * 0.58f, paint);
                  }
                  paint.setShader(null);
              }
          
              private void drawScorePopups(Canvas canvas) {
                  paint.setTextAlign(Paint.Align.CENTER);
                  paint.setTypeface(FONT_BOLD);
                  paint.setTextSize(dp(15f));
                  for (ScorePopup popup : scorePopups) {
                      int alpha = (int) (255 * Math.min(1f, popup.life / 0.35f));
                      paint.setColor(withAlpha(Color.WHITE, alpha));
                      canvas.drawText(popup.text, popup.x, popup.y, paint);
                  }
              }
          
