      - name: Locate and prepare Android SDK
        shell: bash
        run: |
          set -euo pipefail

          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$SDK_ROOT/cmdline-tools" -type f -name sdkmanager 2>/dev/null | sort -V | tail -n 1)"
          fi

          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "Android sdkmanager was not found under: $SDK_ROOT"
            find "$SDK_ROOT" -maxdepth 4 -type f -name sdkmanager -print 2>/dev/null || true
            exit 1
          fi

          echo "Using Android SDK: $SDK_ROOT"
          echo "Using sdkmanager: $SDKMANAGER"
          "$SDKMANAGER" --version

          if [ -w "$SDK_ROOT" ]; then
            SDK_COMMAND=("$SDKMANAGER")
          else
            SDK_COMMAND=(sudo "$SDKMANAGER")
          fi

          yes | "${SDK_COMMAND[@]}" --sdk_root="$SDK_ROOT" --licenses >/dev/null || true
          "${SDK_COMMAND[@]}" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"

      - name: Build debug APK
        shell: bash
        working-directory: generated_project
        run: |
          gradle --version
          gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Collect and verify APK
        shell: bash
        run: |
          set -euo pipefail
          cp generated_project/app/build/outputs/apk/debug/app-debug.apk WonderMerge-v4-debug.apk
          test -s WonderMerge-v4-debug.apk
          sha256sum WonderMerge-v4-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: WonderMerge-v4-APK
          path: WonderMerge-v4-debug.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
