name: Build WonderMerge APK (single-file refactor v4)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wondermerge-v4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'
          cache-provider: basic

      - name: Generate the complete Android project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf generated_project /tmp/wondermerge-v4-project.zip
